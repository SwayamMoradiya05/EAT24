<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="images.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <style>
      /* Hide Google Maps error message overlay */
      div[aria-label*="This page can't load Google Maps"] {
        display: none !important;
      }
      div[aria-label*="Google Maps"] {
        opacity: 1 !important;
      }
    </style>
    <script>
      // Suppress Google Maps billing and console errors
      const originalError = console.error;
      const originalWarn = console.warn;
      const originalLog = console.log;
      
      console.error = function(...args) {
        const message = args[0] ? String(args[0]) : '';
        if (message.includes('BillingNotEnabledMapError') || 
            message.includes('billing') ||
            message.includes('Places API error')) {
          return; // Suppress billing and places API errors
        }
        originalError.apply(console, args);
      };
      
      console.warn = function(...args) {
        const message = args[0] ? String(args[0]) : '';
        if (message.includes('BillingNotEnabledMapError') || 
            message.includes('billing') ||
            message.includes('Google Maps already loaded') ||
            message.includes('loading=async') ||
            message.includes('React Router Future Flag') ||
            message.includes('Relative route resolution') ||
            message.includes('google.maps.places.SearchBox')) {
          return; // Suppress all these warnings
        }
        originalWarn.apply(console, args);
      };
      
      console.log = function(...args) {
        const message = args[0] ? String(args[0]) : '';
        if (message.includes('Download the React DevTools')) {
          return; // Suppress React DevTools suggestion
        }
        originalLog.apply(console, args);
      };
    </script>

    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->

    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Eat24</title>
  </head>
